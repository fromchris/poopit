version: "3.9"

services:
  app:
    build: .
    image: loopit:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Swap to postgres by uncommenting the db service + the postgres URL below.
      DATABASE_URL: "file:./prisma/loopit.db"
      # DATABASE_URL: "postgresql://loopit:loopit@db:5432/loopit?schema=public"
      SESSION_SECRET: "${SESSION_SECRET:?set in .env}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      STORAGE_DRIVER: "${STORAGE_DRIVER:-fs}"
      S3_ENDPOINT: "${S3_ENDPOINT:-}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      S3_PUBLIC_BASE_URL: "${S3_PUBLIC_BASE_URL:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - loopit-data:/app/prisma
      - loopit-storage:/app/storage
    # depends_on:
    #   db:
    #     condition: service_healthy

  # Uncomment to use Postgres in production.
  # db:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: loopit
  #     POSTGRES_PASSWORD: loopit
  #     POSTGRES_DB: loopit
  #   volumes:
  #     - loopit-pg:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U loopit"]
  #     interval: 5s
  #     retries: 10

volumes:
  loopit-data:
  loopit-storage:
  # loopit-pg:
